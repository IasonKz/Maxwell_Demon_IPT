# One-population Maxwell demon run with explicit equilibrium metrics.
num_particles = 160
lx = 20.0
ly = 10.0
radius = 0.14
mass = 1.0
friction_gamma = 0.0
drive_strength = 0.0
restitution = 1.0
dt = 0.004
steps = 6000
snapshot_interval = 10
observable_interval = 5
collision_iterations = 2
seed = 42
velocity_std = 1.0
initial_left_fraction = 0.5
middle_wall_x = 10.0
opening_centers = 3.0, 7.0
opening_height = 1.2
demon_threshold = 1.0
demon_mode = hot_right_cold_left
output_dir = output/one_population
overwrite_output = true

detect_thermal_equilibrium = true
stop_at_thermal_equilibrium = false
stop_at_steady_state = false
equilibrium_window = 120
equilibrium_required_windows = 3
equilibrium_temp_tol = 0.03
equilibrium_density_tol = 0.03
equilibrium_flux_tol = 0.05
equilibrium_slope_tol = 0.02
separated_steady_state_min_score = 0.05
