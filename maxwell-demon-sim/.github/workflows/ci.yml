name: ci

on:
  push:
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build -j
      - name: Smoke test
        run: ./build/maxwell_demon_sim config/smoke.cfg
